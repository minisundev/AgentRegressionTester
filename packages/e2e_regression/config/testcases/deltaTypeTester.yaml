groupName: Weather
# delta 계약 (rangeType 제거 후):
#   duration   → delta = N (그대로, +1 없음), 끝점 필드 없음
#   fromTo     → delta = end−start+1 (INCLUSIVE count), start는 anchor 필드에
#   before/after → delta = ±3 (default window, 끝점 미포함)
# resolver: count = |delta|  (단일식, +1 로직 없음)
cases:

  # ==========================================
  # [Group 1] fromTo — delta = inclusive count
  # 가드: LLM이 gap(end−start)이 아니라 끝점 포함 개수를 주는가
  # ==========================================
  - id: 1
    name: "EN - fromTo - Hourly (6 AM to 12 PM = 7 points)"
    message: "What is the weather like from 6 AM to 12 PM in Seoul?"
    subIntent: CheckHourlyForecast
    mainIntent: Weather
    agentType: DailyInfoAgent
    expectedEntity:
      reasoning:
        $any: true
      location: Seoul
      localizedLocation: Seoul
      country: null
      weatherMetric: all
      delta: 7
      deltaUnit: hour
      rangeRelation: from
      requestedGranularity: null
      timeOfDay: null
      relativeHours: null
      specificHour: 6
      meridiem: am
      relativeDays: null
      specificDate: null
      specificWeekday: null
      relativeWeeks: null
      weekPart: null
      fallback: null
      requestedPresentation: null
    entityMatchMode: exact
    expect:
      specificHour: 6
      meridiem: "am"
      delta: 7          # 6,7,8,9,10,11,12
      relativeHours: null
      specificDate: null
      specificWeekday: null

