  # ───────── Calendar / RemoveEvent ─────────
  - id: CAL-R01
    name: "Calendar remove - 14:30 (단일 → CONFIRM)"
    language: vietnamese
    turns:
      - message: "Xóa lịch lúc 14:30"
        mainIntent: Calendar
        subIntent: RemoveEvent
        mock:
          list:
            - itemId: "evt-101"
              title: "Họp nhóm"
              date: "2026-07-15"
              time: "14:30"
              recurring: "N"
              isActive: "Y"
      - message: "Ừ"
        note: "listCount==1 → 바로 CONFIRM 재질의 → 예 응답으로 완결"
        mainIntent: Calendar
        subIntent: RemoveEvent

  - id: CAL-R02
    name: "Calendar remove - 목록에서 번호 선택 (중간 노이즈 턴 포함)"
