          list:
            - itemId: "evt-201"
              title: "Ăn trưa"
              date: "2026-07-15"
              time: "12:00"
              recurring: "N"
              isActive: "Y"
            - itemId: "evt-202"
              title: "Họp khách hàng"
              date: "2026-07-15"
              time: "15:00"
              recurring: "N"
              isActive: "Y"
