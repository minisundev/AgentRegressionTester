        mainIntent: Calendar
        subIntent: RemoveEvent
      - message: "Xóa lịch số 1"
        mainIntent: Calendar
        subIntent: RemoveEvent
      - message: "Ừ"
        note: "대상 확정 후 CONFIRM 응답 — entity.items 에 itemId 가 와야 함"
        mainIntent: Calendar
        subIntent: RemoveEvent

