  # 시트의 한 셀에 있던 긴 시나리오 — 생성→비활성화→삭제 흐름을 한 대화로 진행.
  # 너무 길면 케이스를 쪼개서 써도 된다 (턴마다 subIntent 만 맞으면 됨).
  - id: ALM-M01
    name: "Alarm 시나리오 - 생성/비활성/삭제 연속"
    language: english
    turns:
      - message: "Set alarm at 9 AM every fortnight"
        mainIntent: Alarm
        subIntent: Create
      - message: "Set alarm for me at 5 PM for the next 3 days"
        mainIntent: Alarm
        subIntent: Create
      - message: "Disable the weekend alarms please"
        mainIntent: Alarm
        subIntent: DeactivateSetting
      - message: "Turn off the weekday alarms"
        mainIntent: Alarm
        subIntent: DeactivateSetting
      - message: "Disable all active alarms"
        mainIntent: Alarm
        subIntent: DeactivateSetting
      - message: "Turn off the 7:00 AM daily alarms"
        mainIntent: Alarm
        subIntent: DeactivateSetting
      - message: "Delete this weekend's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete next weekend's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete this week's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete next week's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete the alarm for the week after next week"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete the weekly alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete this month's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete next month's alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete the alarm for June"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Delete the two weekly alarm"
        mainIntent: Alarm
        subIntent: Remove
      - message: "Turn the alarm off"
        mainIntent: Alarm
        subIntent: DeactivateSetting

  - id: ALM-D01
    name: "Alarm disable - 지금 당장"
    language: english
    turns:
      - message: "Turn off the alarm right now"
        mainIntent: Alarm
