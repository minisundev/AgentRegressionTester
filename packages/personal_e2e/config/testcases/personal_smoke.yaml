# aia-personal 스모크 테스트.
# expectedEntity 없음 — 이 에이전트는 턴을 진행하며 슬롯(entity)을 채우므로
# 러너가 턴별 entity / slot_complete / CONVERSATION_LOCK 을 관찰·기록만 한다.
# 턴별 mainIntent/subIntent 는 상위 NLU 가 넣어주던 값이라 테스트가 직접 지정해야 한다.
# mock: 은 단말 콜백(GET_COUNT / CHECK_DUPLICATE / GET_USER_QUERY) 응답 목업.
groupName: Personal_Smoke
cases:
  # ───────── Calendar / CreateEvent ─────────
  - id: CAL-C01
    name: "Calendar create - Họp 10h"
    language: vietnamese
    turns:
      - message: "Đặt lịch Họp 10h"
        mainIntent: Calendar
        subIntent: CreateEvent

