  # 시트의 한 셀 — 생성 2건 후 비활성/삭제를 연속 발화하는 17턴 시나리오.
  # 비활성/삭제 발화마다 mock 아이템을 줘서 CONFIRM 재질의(LOCK)가 걸리는데,
