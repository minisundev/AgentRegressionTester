# AI-FTC 시트 1:1 매핑 (case id = 시트 행 번호).
# 실행: PERSONAL_CASE_GROUPS=ai_ftc_personal.yaml npm run test:personal
#
# 시트 파리티를 위해 턴은 시트 셀 그대로 — CONFIRM("Ừ"/"Yes") 턴을 추가하지 않았다.
# 따라서 삭제/비활성 케이스는 확인 재질의(LOCK) 상태로 끝나는 게 정상이며,
# 러너는 resultCode==200 이면 PASS 로 본다. 완결형 플로우는 personal_smoke.yaml 참고.
#
# mock.list 는 단말 시뮬레이터의 GET_USER_QUERY 응답 (서버는 단말이 걸러준 결과를 신뢰).
# 발화에 제목이 있으면 제목을 맞춰줬고, 없으면 generic 아이템 1개.
#
# FTC → subIntent 매핑:
#   1401 CreateEvent / 1402 ViewEvent / 1403·1404 RemoveEvent / 1405 CloseScreen
#   1301 Create / 1302 ViewList / 1303·1304 Remove
#   1201 Create / 1202 ViewList / 1203 DeactivateSetting / 1205 Remove / 1208 StopRinging
