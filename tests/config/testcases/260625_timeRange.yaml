# =========================================================================
  # BLOCK A — CADENCE × timeOfDay, 같은 날 (#78 회귀 핵심)
  # 기대: cadence가 timeOfDay를 죽이면 안 됨. 윈도우는 now+5가 아니라
  #       해당 timeOfDay 버킷이어야 함. (parser가 timeOfDay를 살려서 emit)
  # A블록이 깨지고 I블록(트윈)이 통과하면 → 결함은 cadence override 규칙 자체.
  # =========================================================================
  - id: 64
